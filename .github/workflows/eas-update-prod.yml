name: EAS Update Production (OTA)

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  update:
    name: EAS OTA Update Production
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update (OTA)
        run: eas update --branch production --message "Production OTA from master" --non-interactive
        env:
          EXPO_PUBLIC_API_BASE_URL: https://api.buildmyclub.co.uk

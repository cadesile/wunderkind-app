name: EAS Update Staging (OTA)

on:
  push:
    branches:
      - stage

jobs:
  update:
    name: EAS OTA Update Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.6'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update (OTA)
        run: eas update --branch staging --message "Staging OTA from stage branch"
        env:
          EXPO_PUBLIC_API_BASE_URL: http://204.168.207.171:8080
